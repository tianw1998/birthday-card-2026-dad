<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGM 試聽</title>
  <style>
    body {
      font-family: sans-serif;
      background: #FFF8EE;
      margin: 0;
      padding: 24px 16px;
      color: #5c3d1e;
    }
    h1 { font-size: 20px; text-align: center; }
    .track {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .track h2 { font-size: 16px; margin: 0 0 4px; }
    .track p  { font-size: 13px; color: #8a6a48; margin: 0 0 10px; }
    audio { width: 100%; }
    .note { font-size: 12px; color: #a08868; text-align: center; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>🎵 BGM 候選試聽</h1>

  <div class="track">
    <h2>候選 1：Porch Swing Days</h2>
    <p>溫暖悠閒的鋼琴小品，像午後門廊搖椅的愜意感</p>
    <audio controls preload="none" src="assets/candidate1.mp3"></audio>
  </div>

  <div class="track">
    <h2>候選 2：Carefree</h2>
    <p>輕快無憂的旋律，明亮活潑</p>
    <audio controls preload="none" src="assets/candidate2.mp3"></audio>
  </div>

  <div class="track">
    <h2>候選 3：Wholesome</h2>
    <p>溫馨柔和、節奏輕盈，家庭感十足</p>
    <audio controls preload="none" src="assets/candidate3.mp3"></audio>
  </div>

  <p class="note">曲目皆為 Kevin MacLeod (incompetech.com)<br>選定後告訴弟弟編號即可</p>
</body>
</html>
